services:
  gcs:
    container_name: gcs-mysql-test
    hostname: gcs
    image: fsouza/fake-gcs-server:${FAKE_GCS_SERVER_VERSION}
    entrypoint: sh -c "apk add --no-cache curl && mkdir -p /data/mlflow && /bin/fake-gcs-server -data /data -scheme http"
    ports:
      - "0:4443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4443/storage/v1/b || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - gcp_mysql_test_nw

  mysql:
    image: "mysql:${MYSQL_VERSION}"
    container_name: mlflow-gcp-mysql-db
    command: --innodb-buffer-pool-size=256m --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mlflow
      MYSQL_USER: mlflow
      MYSQL_PASSWORD: password
      MYSQL_TCP_PORT: 3306
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpassword || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - gcp_mysql_test_nw

  mlflow:
    container_name: mlflow-gcp-mysql-test
    build:
      context: .
      dockerfile: "Dockerfile-${DISTRO:-debian}"
    command: "mlflow server --backend-store-uri=mysql+pymysql://mlflow:password@mysql:3306/mlflow --default-artifact-root=gs://mlflow/ --host=0.0.0.0 --port=8080"
    environment:
      MLFLOW_FLASK_SERVER_SECRET_KEY: 0123456789
      MLFLOW_DISABLE_TELEMETRY: "true"
      DO_NOT_TRACK: "true"
      GOOGLE_CLOUD_PROJECT: mlflow
      STORAGE_EMULATOR_HOST: http://gcs:4443
    ports:
      - "0:8080"
    healthcheck:
      test: ["CMD", "/opt/venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - gcp_mysql_test_nw
    depends_on:
      gcs:
        condition: service_healthy
      mysql:
        condition: service_healthy

networks:
  gcp_mysql_test_nw:
    driver: bridge
