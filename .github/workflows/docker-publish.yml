name: Build and Publish Mlflow Docker Image

on:
  push:
    branches: [main]
    # Publish semver tags as releases.
    tags:
      - "*.*.*"
    paths:
      - ".github/workflows/docker-publish.yml"
      - ".env"
      - "poetry.lock"
      - "poetry.toml"
      - "pyproject.toml"
      - "Dockerfile-debian"
      - "Dockerfile-alpine"
      - "mlflowstack/**"
      - "docker-compose.*.yaml"
      - "tests/**"
      - "test-containers/**"

  pull_request:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Load .env and generate matrix
        id: set-matrix
        run: |
          set -a
          source .env
          set +a

          MATRIX=$(jq -c -n \
            --arg pg1 "15" \
            --arg pg2 "16" \
            --arg pg3 "$POSTGRES_VERSION" \
            --arg my1 "8.0" \
            --arg my2 "8.4" \
            --arg my3 "$MYSQL_VERSION" \
            --arg minio "$MINIO_VERSION" \
            --arg gcs "$FAKE_GCS_SERVER_VERSION" \
            --arg azurite "$AZURITE_VERSION" \
            --arg azure_blob "$AZURE_STORAGE_BLOB_VERSION" \
            --arg lldap "$LLDAP_VERSION" \
            --arg mssql "$MSSQL_VERSION" \
            --arg keycloak "${KEYCLOAK_VERSION:-25.0.0}" \
            --arg redis "${REDIS_VERSION:-7}" \
            '[
              { "postgres": $pg1, "mysql": $my1, "minio": $minio, "gcs": $gcs, "azurite": $azurite, "azure-storage-blob": $azure_blob, "lldap": $lldap, "mssql": $mssql, "keycloak": $keycloak, "redis": $redis },
              { "postgres": $pg2, "mysql": $my2, "minio": $minio, "gcs": $gcs, "azurite": $azurite, "azure-storage-blob": $azure_blob, "lldap": $lldap, "mssql": $mssql, "keycloak": $keycloak, "redis": $redis },
              { "postgres": $pg3, "mysql": $my3, "minio": $minio, "gcs": $gcs, "azurite": $azurite, "azure-storage-blob": $azure_blob, "lldap": $lldap, "mssql": $mssql, "keycloak": $keycloak, "redis": $redis }
            ]')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
        shell: /usr/bin/bash -e {0}

  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      - name: Install library
        run: poetry install --no-interaction

      - name: Run unit tests
        run: poetry run pytest tests/unit/

  integrationtest:
    needs: [setup, unittest]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        database-combo: ${{ fromJson(needs.setup.outputs.matrix) }}

    name: Test PostgreSQL ${{ matrix.database-combo.postgres }} & MySQL ${{ matrix.database-combo.mysql }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      #----------------------------------------------
      #  -----  install & configure poetry  -----
      #----------------------------------------------
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      #----------------------------------------------
      #       load cached venv if cache exists
      #----------------------------------------------
      - name: Load cached venv
        id: cached-poetry-dependencies
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}

      #----------------------------------------------
      # install dependencies if cache does not exist
      #----------------------------------------------
      - name: Install dependencies
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install --no-interaction --no-root

      #----------------------------------------------
      # install your root project, if required
      #----------------------------------------------
      - name: Install library
        run: poetry install --no-interaction

      - name: Cache shared service Docker images
        id: cache-shared-images
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.docker-cache/shared
          key: ${{ runner.os }}-docker-shared-${{ matrix.database-combo.minio }}-${{ matrix.database-combo.gcs }}-${{ matrix.database-combo.azurite }}-${{ matrix.database-combo.lldap }}-${{ matrix.database-combo.mssql }}-${{ matrix.database-combo.keycloak }}-${{ matrix.database-combo.redis }}
          restore-keys: |
            ${{ runner.os }}-docker-shared-

      - name: Cache database Docker images
        id: cache-db-images
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.docker-cache/db
          key: ${{ runner.os }}-docker-db-${{ matrix.database-combo.postgres }}-${{ matrix.database-combo.mysql }}
          restore-keys: |
            ${{ runner.os }}-docker-db-

      - name: Load Cached Shared Service Images
        if: steps.cache-shared-images.outputs.cache-hit == 'true'
        run: docker load --input ${{ github.workspace }}/.docker-cache/shared/shared-images.tar

      - name: Load Cached Database Images
        if: steps.cache-db-images.outputs.cache-hit == 'true'
        run: docker load --input ${{ github.workspace }}/.docker-cache/db/db-images.tar

      - name: Pull and Save Shared Service Images if not Cached
        if: steps.cache-shared-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/.docker-cache/shared
          docker pull minio/minio:${{ matrix.database-combo.minio }} &
          docker pull fsouza/fake-gcs-server:${{ matrix.database-combo.gcs }} &
          docker pull mcr.microsoft.com/azure-storage/azurite:${{ matrix.database-combo.azurite }} &
          docker pull lldap/lldap:${{ matrix.database-combo.lldap }} &
          docker pull mcr.microsoft.com/mssql/server:${{ matrix.database-combo.mssql }} &
          docker pull keycloak/keycloak:${{ matrix.database-combo.keycloak }} &
          docker pull redis:${{ matrix.database-combo.redis }} &
          wait
          docker save -o ${{ github.workspace }}/.docker-cache/shared/shared-images.tar \
            minio/minio:${{ matrix.database-combo.minio }} \
            fsouza/fake-gcs-server:${{ matrix.database-combo.gcs }} \
            mcr.microsoft.com/azure-storage/azurite:${{ matrix.database-combo.azurite }} \
            lldap/lldap:${{ matrix.database-combo.lldap }} \
            mcr.microsoft.com/mssql/server:${{ matrix.database-combo.mssql }} \
            keycloak/keycloak:${{ matrix.database-combo.keycloak }} \
            redis:${{ matrix.database-combo.redis }}

      - name: Pull and Save Database Images if not Cached
        if: steps.cache-db-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/.docker-cache/db
          docker pull postgres:${{ matrix.database-combo.postgres }} &
          docker pull mysql:${{ matrix.database-combo.mysql }} &
          wait
          docker save -o ${{ github.workspace }}/.docker-cache/db/db-images.tar \
            postgres:${{ matrix.database-combo.postgres }} \
            mysql:${{ matrix.database-combo.mysql }}

      #----------------------------------------------
      #  pre-build MLflow images with layer cache
      #  (separates build RAM from test RAM, and
      #   shares layers across matrix jobs via GHA)
      #----------------------------------------------
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Pre-build MLflow debian image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile-debian
          push: false
          load: true
          tags: mlflow-mlflow:debian
          cache-from: type=gha,scope=mlflow-debian
          cache-to: type=gha,mode=max,scope=mlflow-debian

      - name: Pre-build MLflow alpine image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile-alpine
          push: false
          load: true
          tags: mlflow-mlflow:alpine
          cache-from: type=gha,scope=mlflow-alpine
          cache-to: type=gha,mode=max,scope=mlflow-alpine

      #----------------------------------------------
      #              run test suite
      #----------------------------------------------
      - name: Run tests
        env:
          POSTGRES_VERSION: ${{ matrix.database-combo.postgres }}
          MYSQL_VERSION: ${{ matrix.database-combo.mysql }}
          MINIO_VERSION: ${{ matrix.database-combo.minio }}
          FAKE_GCS_SERVER_VERSION: ${{ matrix.database-combo.gcs }}
          AZURITE_VERSION: ${{ matrix.database-combo.azurite }}
          AZURE_STORAGE_BLOB_VERSION: ${{ matrix.database-combo.azure-storage-blob }}
          LLDAP_VERSION: ${{ matrix.database-combo.lldap }}
          MSSQL_VERSION: ${{ matrix.database-combo.mssql }}
          KEYCLOAK_VERSION: ${{ matrix.database-combo.keycloak }}
          REDIS_VERSION: ${{ matrix.database-combo.redis }}
        run: |
          source .venv/bin/activate
          poetry run pytest tests/integration/

  buildtestpush:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        variant: [alpine, debian]

    needs: integrationtest

    env:
      IMAGE_NAME: ${{ github.repository }}

    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install ORAS
        id: install_oras
        uses: oras-project/setup-oras@v2

      - name: Install Cosign
        id: install_cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.1.0
        with:
          platforms: all

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        id: docker_hub_login
        if: github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to GHCR
        id: ghcr_login
        if: github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/')
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry (ORAS)
        id: oras_ghcr_login
        if: github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/')
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Publish Artifact Hub Manifest
        id: publish_ah_manifest
        if: github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/')
        run: |
          oras push \
            ghcr.io/${{ env.IMAGE_NAME }}:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=${{ matrix.variant == 'alpine' && '-alpine' || '' }}
          tags: |
            type=ref,event=pr
            type=edge,branch=main,suffix=${{ matrix.variant == 'alpine' && '-{{sha}}-alpine' || '-{{sha}}' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ contains(github.ref, 'refs/tags/') && matrix.variant == 'debian' }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/burakince/mlflow/refs/heads/main/README.md
            io.artifacthub.package.maintainers=[{"name":"burakince","email":"burak.ince@linux.org.tr"}]
            io.artifacthub.package.logo-url=https://raw.githubusercontent.com/mlflow/mlflow/master/assets/logo.svg
            io.artifacthub.package.keywords=machine-learning,ai,ml,model-management,mlflow,mlflow-tracking-server,mlflow-docker,mlflow-tracking,mlflow-kube
            io.artifacthub.package.license=MIT
            io.artifacthub.package.alternative-locations=${{ env.IMAGE_NAME }}

      - name: Build image for local analysis
        id: build-docker-image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile-${{ matrix.variant }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan-${{ matrix.variant }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mlflow-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=mlflow-${{ matrix.variant }}

      - name: Run Snyk to check Docker image for vulnerabilities
        id: docker-image-scan
        continue-on-error: true
        uses: snyk/actions/docker@v1.0.0
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.IMAGE_NAME }}:scan-${{ matrix.variant }}
          args: --file=Dockerfile-${{ matrix.variant }} --severity-threshold=medium --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        if: hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile-${{ matrix.variant }}
          platforms: ${{ contains(github.ref, 'refs/tags/') && 'linux/arm64/v8,linux/amd64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/') }}
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mlflow-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=mlflow-${{ matrix.variant }}

      - name: Sign the published Docker images
        if: github.event_name != 'pull_request' && contains(github.ref, 'refs/tags/')
        run: |
          echo "${{ steps.meta.outputs.tags }}" | xargs -I {} cosign sign --yes {}@${{ steps.build-and-push.outputs.digest }}

  deprecationandcleaning:
    runs-on: ubuntu-latest

    needs: buildtestpush

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Image Version Deprecation & Cleaning
        run: echo "This is a placeholder!"
